name: Preview Deployment Check

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx next build

  await-vercel-preview:
    name: Vercel Preview Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deployment
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        id: vercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300

      - name: Verify preview is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.vercel.outputs.url }}")
          echo "Preview URL: ${{ steps.vercel.outputs.url }}"
          echo "Status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Preview deployment returned $STATUS, expected 200"
            exit 1
          fi
